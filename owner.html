<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Core - Owner Control Centre</title>
    <!-- استدعاء Bootstrap 5 -->
     <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* ألوان الأونر المخصصة: أزرق داكن */
        body { background-color: #040a18; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; }
        .bg-card-blue { background-color: #0a162d; }
        .border-blue-custom { border-color: #172a4f !important; }
        
        /* حقول الإدخال */
        .input-blue { background-color: #040a18; border: 1px solid #172a4f; color: #bfdbfe; }
        .input-blue:focus { border-color: #e11d48; outline: none; box-shadow: 0 0 0 0.25rem rgba(225, 29, 72, 0.25); color: #fff;}
        .input-blue::placeholder { color: rgba(148, 163, 184, 0.5); }
        
        /* ألوان مميزة للأونر (تميل للوردي/الأحمر الفاتح) */
        .text-owner-primary { color: #f43f5e !important; }
        .bg-owner-primary { background-color: #f43f5e !important; color: white !important; }
        .bg-owner-primary:hover { background-color: #e11d48 !important; }
        
        .cursor-pointer { cursor: pointer; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 position-relative">
    
    <!-- حاوية الإشعارات -->
    <div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1090; max-width: 350px; width: 100%;"></div>

    <!-- القائمة الجانبية (Offcanvas) -->
    <div class="offcanvas offcanvas-start bg-card-blue border-end border-blue-custom text-white" tabindex="-1" id="sidebar-menu">
        <div class="offcanvas-header border-bottom border-blue-custom mb-2">
            <h5 class="offcanvas-title text-owner-primary fw-black">ALPHA OWNER</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        
        <div class="offcanvas-body d-flex flex-column p-3 pt-0">
            <!-- محدد اللغة -->
            <div class="d-flex align-items-center justify-content-between mb-4 border border-blue-custom p-2 rounded" style="background-color: #040a18;">
                <span class="text-secondary fw-bold" style="font-size: 0.8rem;">🌐 Langue:</span>
                <select id="lang-select" onchange="changeLanguage(this.value)" class="form-select form-select-sm bg-card-blue text-white border-blue-custom w-auto fw-bold cursor-pointer shadow-none">
                    <option value="fr">Français</option><option value="ar">العربية</option><option value="en">English</option>
                </select>
            </div>

            <h6 class="text-secondary fw-bold mb-3 text-uppercase" style="font-size: 0.75rem;" id="menu-title">Menu de Gestion</h6>
            
            <nav class="d-flex flex-column gap-2 flex-grow-1">
                <button onclick="fetchAndOpenHistory('casino')" class="btn text-start text-secondary fw-bold w-100 border border-transparent hover-bg-dark">🎰 Historique de casino</button>
                <button onclick="fetchAndOpenHistory('transfert')" class="btn text-start text-secondary fw-bold w-100 border border-transparent hover-bg-dark">💸 Historique de transfert</button>
                <button onclick="fetchAndOpenHistory('sport')" class="btn text-start text-secondary fw-bold w-100 border border-transparent hover-bg-dark">⚽ Historique de sport</button>
                <button onclick="fetchAndOpenHistory('compte')" class="btn text-start text-secondary fw-bold w-100 border border-transparent hover-bg-dark">👤 Historique de compte</button>
                <button onclick="openPasswordModal()" class="btn text-start text-secondary fw-bold w-100 border border-transparent hover-bg-dark">🔑 Changement de mot de passe</button>
                <button onclick="fetchAndOpenHistory('pending')" class="btn text-start text-warning fw-bold w-100 border border-transparent hover-bg-dark mt-2 border-top border-blue-custom pt-3">🔔 Demandes en attente (الطلبات المعلقة)</button>
            </nav>
            <button onclick="logout()" id="btn-logout" class="btn btn-outline-danger w-100 mt-3 fw-bold">🚪 Déconnexion</button>
        </div>
    </div>

    <!-- الهيدر العلوي -->
    <header class="bg-card-blue border-bottom border-blue-custom px-3 py-3 d-flex justify-content-between align-items-center shadow-sm sticky-top">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-secondary border-0 text-white px-2 py-1 fs-4" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar-menu">☰</button>
            <h1 class="h5 mb-0 fw-black text-owner-primary tracking-wider d-none d-md-block">ALPHA <span class="text-white fw-light">OWNER</span></h1>
        </div>
       <div class="d-flex align-items-center gap-2">
    <!-- الزر الجديد -->
    <button id="audio-enable-btn" onclick="enableAudio()" class="btn btn-sm btn-outline-warning">🔊</button>
    <span class="badge bg-danger bg-opacity-25 text-owner-primary border border-danger px-2 py-1" id="badge-role">Super Owner</span>
    <span class="fw-bold text-white" id="owner-username">fethi</span>
</div>
    </header>

    <!-- مساحة العمل الرئيسية -->
    <main class="flex-grow-1 p-3 mx-auto w-100" style="max-width: 900px;">
        
        <div class="d-flex flex-column gap-4">
            
            <!-- لوحة التحكم بالمستخدم المحدد -->
            <section class="bg-card-blue border border-blue-custom rounded p-3 shadow-sm">
                <div class="row g-3 items-end">
                    <div class="col-12 col-md-4">
                        <label class="text-secondary fw-bold mb-1" style="font-size: 0.75rem;" id="lbl-selected-user">Utilisateur Sélectionné</label>
                        <input type="text" id="ctrl-target-user" class="form-control input-blue text-white fw-bold font-monospace text-center" placeholder="Sélectionnez..." readonly>
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="text-secondary fw-bold mb-1 d-flex justify-content-between" style="font-size: 0.75rem;">
                            <span>🎮 RTP:</span>
                            <span id="rtp-val-label" class="text-owner-primary">50%</span>
                        </label>
                        <input type="range" id="ctrl-rtp-range" min="1" max="99" value="50" oninput="document.getElementById('rtp-val-label').innerText = this.value + '%'" class="form-range" style="accent-color: #f43f5e;">
                    </div>
                    <div class="col-12 col-md-4 d-flex gap-2">
                        <button onclick="saveRtpAndBlock(0)" class="btn btn-success flex-grow-1 fw-bold text-dark" style="font-size: 0.8rem;">🔓 حفظ</button>
                        <button onclick="saveRtpAndBlock(1)" class="btn btn-warning flex-grow-1 fw-bold text-dark" style="font-size: 0.8rem;">⛔ حظر</button>
                        <button onclick="deleteAccountAction()" class="btn btn-danger flex-grow-1 fw-bold" style="font-size: 0.8rem;">🗑️ حذف</button>
                    </div>
                </div>
            </section>

            <!-- إنشاء حساب جديد -->
            <section class="bg-card-blue border border-blue-custom rounded p-3 shadow-sm">
                <h6 class="fw-bold text-white mb-3" dir="rtl" id="title-create-user">👑 Créer un nouveau compte dans le réseau</h6>
                <div class="row g-2 mb-3">
                    <div class="col-12 col-md-4">
                        <label class="text-secondary mb-1" style="font-size: 0.75rem;" id="lbl-username">Nom d'utilisateur</label>
                        <input type="text" id="new-user-name" class="form-control input-blue font-monospace">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="text-secondary mb-1" style="font-size: 0.75rem;" id="lbl-password">Mot de passe</label>
                        <input type="password" id="new-user-pass" class="form-control input-blue font-monospace">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="text-secondary mb-1" style="font-size: 0.75rem;">Rôle</label>
                        <select id="new-user-role" class="form-select input-blue font-monospace">
                            <option value="owner">Owner</option><option value="super_admin">Super Admin</option><option value="admin">Admin</option><option value="shop">Shop</option><option value="player">Player</option>
                        </select>
                    </div>
                </div>
                <button onclick="createNetworkUser()" class="btn bg-owner-primary w-100 fw-bold" id="btn-create">Créer le compte</button>
            </section>

            <!-- العمليات المالية وتغيير كلمة سر المستخدم -->
            <section class="bg-card-blue border border-blue-custom rounded p-3 shadow-sm">
                <h6 class="fw-bold text-white mb-3" dir="rtl" id="title-table-console">📋 Console de gestion globale des comptes</h6>
                
                <div class="row g-2 mb-2">
                    <div class="col-6">
                        <input type="text" id="target-action-user" readonly placeholder="Compte" class="form-control input-blue text-center text-owner-primary fw-bold">
                    </div>
                    <div class="col-6">
                        <input type="number" id="target-action-amount" placeholder="Montant TND" class="form-control input-blue text-center font-monospace">
                    </div>
                </div>
                
                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <button onclick="executeAction('charge')" id="btn-credit" class="btn btn-success w-100 fw-bold text-dark">Créditer</button>
                    </div>
                    <div class="col-6">
                        <button onclick="executeAction('withdraw')" id="btn-retirer" class="btn btn-danger w-100 fw-bold">Retirer</button>
                    </div>
                </div>

                <!-- إضافة ميزة تغيير كلمة السر للمستخدم المحدد هنا -->
                <div class="d-flex gap-2 pt-3 border-top border-blue-custom">
                    <input type="password" id="ctrl-user-new-pass" placeholder="كلمة سر جديدة للمستخدم" class="form-control input-blue font-monospace" dir="rtl">
                    <button onclick="changeUserPasswordFromOwner()" class="btn btn-info fw-bold px-4">تغيير</button>
                </div>
            </section>

            <!-- قائمة المستخدمين (البحث + الكروت) -->
            <section class="bg-card-blue border border-blue-custom rounded shadow-sm overflow-hidden">
                <div class="p-3 border-bottom border-blue-custom">
                    <div class="d-flex align-items-center bg-dark border border-blue-custom rounded p-2">
                        <span class="ms-2">🔍</span>
                        <input type="text" id="search-input" oninput="renderFilteredUsers()" placeholder="بحث عن مستخدم..." class="form-control border-0 bg-transparent text-white shadow-none p-0 ps-2" dir="rtl" style="font-size: 0.85rem;">
                    </div>
                </div>
                <div id="owner-network-tbody" class="p-3 d-flex flex-column gap-2" style="max-height: 500px; overflow-y: auto;">
                    <!-- سيتم عرض البطاقات هنا -->
                </div>
            </section>
        </div>

    </main>

    <!-- نافذة السجلات (Modal للرياضة والتحويلات) -->
    <div class="modal fade" id="historyModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-card-blue border-blue-custom text-white">
                <div class="modal-header border-blue-custom">
                    <h6 class="modal-title fw-bold text-owner-primary" id="modal-title">Historique</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-3" id="modal-dynamic-content">
                    <!-- سيتم حقن الجداول أو الفلاتر هنا برمجياً -->
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة تعديل كلمة سر النظام الخاصة بالأونر -->
    <div class="modal fade" id="passwordModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content bg-card-blue border-blue-custom text-white">
                <div class="modal-header border-blue-custom">
                    <h6 class="modal-title fw-bold">🔑 Modifier le mot de passe</h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="password" id="new-sys-pass" placeholder="Nouveau mot de passe" class="form-control input-blue mb-3 font-monospace">
                    <button onclick="submitNewPassword()" class="btn bg-owner-primary w-100 fw-bold">Mettre à jour</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://alpha-casino.onrender.com";

        let allUsers = []; 
        let allTransactionsCache = []; // كاش المعاملات
        let user = JSON.parse(localStorage.getItem('alpha_user')) || { username: 'fethi', role: 'owner' };

        function getAuthHeaders() {
            const token = localStorage.getItem('token');
            return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
        }

        const translations = {
            fr: { menu: "Menu de Gestion", selected: "Utilisateur Sélectionné", create: "👑 Créer un nouveau compte", user: "Nom d'utilisateur", pass: "Mot de passe", console: "📋 Console de gestion globale", credit: "Créditer", retirer: "Retirer", out: "🚪 Déconnexion" },
            ar: { menu: "قائمة الإدارة", selected: "المستعمل المختار", create: "👑 إنشاء حساب جديد", user: "اسم المستخدم", pass: "كلمة المرور", console: "📋 لوحة التحكم المالي", credit: "شحن رصيد", retirer: "سحب", out: "🚪 تسجيل الخروج" },
            en: { menu: "Management Menu", selected: "Selected Account", create: "👑 Create New Account", user: "Username", pass: "Password", console: "📋 Global Balances Console", credit: "Charge", retirer: "Withdraw", out: "🚪 Logout" }
        };

        function changeLanguage(lang) {
            document.body.dir = (lang === 'ar') ? 'rtl' : 'ltr';
            document.getElementById('menu-title').innerText = translations[lang].menu; 
            document.getElementById('lbl-selected-user').innerText = translations[lang].selected; 
            document.getElementById('title-create-user').innerText = translations[lang].create; 
            document.getElementById('lbl-username').innerText = translations[lang].user; 
            document.getElementById('lbl-password').innerText = translations[lang].pass; 
            document.getElementById('title-table-console').innerText = translations[lang].console; 
            document.getElementById('btn-credit').innerText = translations[lang].credit; 
            document.getElementById('btn-retirer').innerText = translations[lang].retirer; 
            document.getElementById('btn-logout').innerText = translations[lang].out;
        }

        window.addEventListener('DOMContentLoaded', () => {
            const el = document.getElementById('owner-username');
            if(el) el.innerText = user.username;
            loadNetworkData();
        });

        // --- نظام الإشعارات ---
        function showNotification(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toastEl = document.createElement('div');
            toastEl.className = `toast align-items-center text-white border-0 mb-2 show ${type === 'success' ? 'bg-success' : 'bg-danger'}`;
            toastEl.innerHTML = `<div class="d-flex"><div class="toast-body fw-bold" style="font-size: 0.85rem;">${type === 'success' ? '✅' : '❌'} ${message}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
            container.appendChild(toastEl);
            setTimeout(() => { toastEl.remove(); }, 3500);
        }

        // --- جلب وعرض الشبكة ---
        async function loadNetworkData() {
            try {
                const res = await fetch(`${BACKEND_URL}/api/admin/users?t=${Date.now()}`, { headers: getAuthHeaders() });
                if (res.ok) {
                    allUsers = await res.json();
                    renderFilteredUsers();
                }
            } catch (e) { console.error(e); }
        }

        function renderUsers(data) {
            const container = document.getElementById('owner-network-tbody');
            if (!container) return;
            container.innerHTML = ''; 
            
            if(data.length === 0) {
                container.innerHTML = `<div class="text-center text-secondary p-3" style="font-size: 0.85rem;">لا توجد حسابات.</div>`;
                return;
            }

            data.forEach(u => {
                const userRtp = u.rtp || 50;
                const balance = parseFloat(u.balance || 0);
                const usernameClean = u.username || 'Inconnu';
                const createdByClean = u.created_by || 'System';
                const userRole = u.role ? u.role.toUpperCase() : 'PLAYER';
                const statusDot = u.is_blocked === 1 ? 'bg-danger' : 'bg-success';

                container.innerHTML += `
                <div class="card bg-transparent border-blue-custom shadow-sm cursor-pointer" style="background-color: #040a18 !important;" onclick="selectForControl('${usernameClean}', ${userRtp})">
                    <div class="card-body p-2 d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-3">
                            <div class="position-relative p-2 rounded-circle border border-secondary bg-card-blue">👤
                                <span class="position-absolute top-0 start-100 translate-middle p-1 ${statusDot} border border-dark rounded-circle"></span>
                            </div>
                            <div>
                                <div class="text-white fw-bold mb-0" style="font-size: 0.9rem;">${usernameClean}</div>
                                <div class="text-info fw-bold" style="font-size: 0.65rem;">${userRole} | By: ${createdByClean}</div>
                            </div>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <!-- تم تغيير اللون هنا إلى text-white -->
                            <span class="text-white fw-bold font-monospace" style="font-size: 0.85rem;">${balance.toFixed(2)} TND</span>
                            <div class="badge bg-secondary bg-opacity-25 text-white border border-secondary p-2">🎯</div>
                        </div>
                    </div>
                </div>`;
            });
        }

        function renderFilteredUsers() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            let filtered = allUsers.filter(u => (u.username || '').toLowerCase().includes(searchTerm));
            filtered.sort((a, b) => parseFloat(b.balance || 0) - parseFloat(a.balance || 0));
            renderUsers(filtered);
        }

        function selectForControl(username, rtp) {
            document.getElementById('ctrl-target-user').value = username;
            document.getElementById('target-action-user').value = username;
            document.getElementById('ctrl-rtp-range').value = rtp;
            document.getElementById('rtp-val-label').innerText = rtp + '%';
            showNotification(`تم تحديد: ${username}`);
        }

    // --- المودال: الفلترة والتواريخ للرياضة والتحويلات والحسابات ---
        async function fetchAndOpenHistory(type) {
            const modalEl = document.getElementById('historyModal');
            const myModal = new bootstrap.Modal(modalEl);
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-dynamic-content');
            const target_username = document.getElementById('ctrl-target-user').value.trim().toLowerCase();
            const safeType = type.trim().toLowerCase(); 
            
            title.innerText = "Historique: " + safeType.toUpperCase();
            body.innerHTML = '<div class="text-center p-4 text-info fw-bold">Chargement en cours... (جاري التحميل)</div>';
            myModal.show();

            // 1. الرياضة
            if (safeType === 'sport') {
                if(!target_username || target_username === "sélectionnez...") {
                    body.innerHTML = `<div class="text-center p-4 text-warning fw-bold">Sélectionnez un joueur dans la console d'abord ! (اختر لاعباً أولاً)</div>`;
                    return;
                }
                
                try {
                    const res = await fetch(`${BACKEND_URL}/api/admin/get-player-tickets?username=${encodeURIComponent(target_username)}&t=${Date.now()}`, { headers: getAuthHeaders() });
                    if (res.ok) {
                        const tickets = await res.json();
                        if (tickets && tickets.length > 0) {
                            let html = `<div class="d-flex flex-column gap-2" style="max-height: 400px; overflow-y: auto;">`;
                            tickets.forEach(t => {
                                let badgeColor = t.status === "gagne" ? "text-success" : (t.status === "perdu" ? "text-danger" : (t.status === "cashout" ? "text-warning" : "text-info"));
                                let matchesHtml = Array.isArray(t.details_list) ? t.details_list.map(g => `• ${g.matchName} (<span class="text-warning">${g.outcome}</span>)`).join('<br>') : (t.match || "Match Inconnu");
                                
                                html += `
                                <div class="card bg-transparent border-secondary shadow-sm" style="background-color: #040a18 !important;">
                                    <div class="card-body p-2 d-flex flex-column flex-md-row justify-content-between gap-2">
                                        <div class="text-white" style="font-size: 0.75rem; line-height: 1.4;">
                                            <span class="text-secondary">#${t.ticket_id} | ${t.date || ''}</span><br>${matchesHtml}
                                        </div>
                                        <div class="text-end font-monospace" style="font-size: 0.7rem;">
                                            <div class="text-light mb-1">Cote: X${parseFloat(t.total_cote).toFixed(2)} | Mise: ${parseFloat(t.mise).toFixed(2)}</div>
                                            <div class="fw-bold ${badgeColor}">Gain: +${parseFloat(t.gain).toFixed(2)} TND</div>
                                            <span class="badge border border-secondary text-uppercase ${badgeColor} mt-1">${t.status}</span>
                                        </div>
                                    </div>
                                </div>`;
                            });
                            html += `</div>`;
                            body.innerHTML = html;
                        } else {
                            body.innerHTML = `<div class="text-center p-4 text-secondary fw-bold">Aucun pari actif pour ce joueur.</div>`;
                        }
                    }
                } catch(e) { body.innerHTML = `<div class="text-center p-4 text-danger fw-bold">Erreur de connexion API</div>`; }
                
            } 
            // 2. سجل التحويلات
            else if (safeType === 'transfert') {
                try {
                    const res = await fetch(`${BACKEND_URL}/api/admin/transactions-history?username=${user.username}`, { headers: getAuthHeaders() });
                    if(res.ok) {
                        allTransactionsCache = await res.json();
                        renderTransactionsModalUI(body);
                    }
                } catch(e) { body.innerHTML = `<div class="text-center p-4 text-danger fw-bold">Erreur de connexion API</div>`; }
            } 
            // 3. سجل الحسابات (Compte) - الجزء الجديد
          // 3. سجل الحسابات (إحصائيات مالية مفصلة)
            else if (safeType === 'compte') {
                try {
                    // جلب قائمة المستخدمين (للاختيار) + جلب كل المعاملات (للحساب) في نفس الوقت
                    const [usersRes, txRes] = await Promise.all([
                        fetch(`${BACKEND_URL}/api/admin/users?t=${Date.now()}`, { headers: getAuthHeaders() }),
                        fetch(`${BACKEND_URL}/api/admin/transactions-history?username=${user.username}`, { headers: getAuthHeaders() })
                    ]);

                    if(usersRes.ok && txRes.ok) {
                        const usersList = await usersRes.json();
                        allTransactionsCache = await txRes.json(); // حفظ المعاملات للفلترة
                        
                        renderCompteStatsUI(body, usersList); // رسم واجهة الإحصائيات
                    } else {
                        body.innerHTML = `<div class="text-center p-4 text-danger fw-bold">خطأ في جلب البيانات</div>`;
                    }
                } catch(e) { body.innerHTML = `<div class="text-center p-4 text-danger fw-bold">Erreur de connexion API</div>`; }
            }
            // 4. الطلبات المعلقة (Pending Requests)
            else if (safeType === 'pending') {
                try {

        async function handlePendingRequest(txId, decision) {
            const btnConfirm = confirm(decision === 'accept' ? 'هل أنت متأكد من قبول العملية وشحن الرصيد؟' : 'هل أنت متأكد من رفض وحذف هذا الطلب؟');
            if (!btnConfirm) return;

            try {
                const res = await fetch(`${BACKEND_URL}/api/admin/handle-request`, {
                    method: 'POST',
                    headers: getAuthHeaders(),
                    body: JSON.stringify({
                        transaction_id: txId,
                        decision: decision,
                        admin_username: user.username
                    })
                });
                if (res.ok) {
                    showNotification(decision === 'accept' ? 'تمت الموافقة بنجاح وتم تحديث الرصيد! ✅' : 'تم رفض الطلب وحذفه! ❌');
                    fetchAndOpenHistory('pending'); // إعادة تحميل قائمة الطلبات ليتحدث شكلها
                    loadNetworkData(); // تحديث أرقام الأرصدة في الخلفية
                    if (decision === 'accept') {
    triggerGoldRain();
}
                } else {
                    const data = await res.json();
                    showNotification(data.detail || 'حدث خطأ أثناء المعالجة', 'error');
                }
            } catch(e) {
                showNotification('خطأ في الاتصال بالسيرفر', 'error');
            }
        }

        function applyModalDateFilter() {

        // --- الآلة الحاسبة: فرز التواريخ وحساب المبالغ ---
        function calculateAccountStats() {
            const selectedUser = document.getElementById('stat-user-select').value;
            const startDate = document.getElementById('stat-start-date').value;
            const endDate = document.getElementById('stat-end-date').value;

            let filteredTx = allTransactionsCache || [];

            // 1. فلترة حسب المستخدم (إذا لم يختر "الكل")
            if (selectedUser !== "ALL") {
                filteredTx = filteredTx.filter(t => t.target_username === selectedUser);
            }

            // 2. فلترة حسب التاريخ
            if (startDate || endDate) {
                filteredTx = filteredTx.filter(t => {
                    const txDate = t.date ? t.date.split(' ')[0] : '';
                    if (!txDate) return false;
                    let isAfterStart = true, isBeforeEnd = true;
                    if (startDate) isAfterStart = txDate >= startDate;
                    if (endDate) isBeforeEnd = txDate <= endDate;
                    return isAfterStart && isBeforeEnd;
                });
            }

            // 3. حساب المجاميع
            let totalCharged = 0;
            let totalWithdrawn = 0;

            filteredTx.forEach(t => {
                const amt = parseFloat(t.amount) || 0;
                if (t.action === 'charge') totalCharged += amt;
                else if (t.action === 'withdraw') totalWithdrawn += amt;
            });

            // 4. رسم النتيجة النهائية
            const dashboard = document.getElementById('stat-dashboard-results');
            const titleText = selectedUser === "ALL" ? "📊 إحصائيات الموقع بالكامل" : `📊 إحصائيات الحساب: <span class="text-white">${selectedUser}</span>`;

            let html = `
                <h6 class="text-owner-primary fw-bold text-center mb-3" dir="rtl">${titleText}</h6>
                <div class="row g-2 mb-2">
                    <div class="col-6">
                        <div class="bg-card-blue border border-success rounded p-3 text-center shadow-sm">
                            <div class="text-secondary mb-1" style="font-size: 0.7rem;">إجمالي الشحن المباع ⬆️</div>
                            <div class="text-success fw-bold font-monospace" style="font-size: 1.1rem;">${totalCharged.toFixed(2)} TND</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="bg-card-blue border border-danger rounded p-3 text-center shadow-sm">
                            <div class="text-secondary mb-1" style="font-size: 0.7rem;">إجمالي السحب ⬇️</div>
                            <div class="text-danger fw-bold font-monospace" style="font-size: 1.1rem;">${totalWithdrawn.toFixed(2)} TND</div>
                        </div>
                    </div>
                </div>
                <div class="bg-card-blue border border-blue-custom rounded p-3 text-center shadow-sm">
                    <div class="text-secondary mb-1" style="font-size: 0.7rem;">صافي الحركة (الشحن ناقص السحب)</div>
                    <div class="text-info fw-bold font-monospace" style="font-size: 1.3rem;">${(totalCharged - totalWithdrawn).toFixed(2)} TND</div>
                </div>
            `;
            
            dashboard.innerHTML = html;
        }

function animateBalance(element, start, end, duration) {
    let startTimestamp = null;
    const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        
        // حساب الرقم المتصاعد وتنسيقه ليكون برقمين عشريين
        const currentVal = (progress * (end - start) + start).toFixed(2);
        element.innerHTML = currentVal + " TND";
        
        if (progress < 1) {
            window.requestAnimationFrame(step);
        }
    };
    window.requestAnimationFrame(step);
}
